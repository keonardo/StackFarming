name: "Godot HTML5 Export & Deploy to Pages"

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  GODOT_VERSION: "4.6.2"
  PROJECT_NAME: "StackFarming"

jobs:
  export-html5:
    name: HTML5 Export
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK 8.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq wget unzip git

      - name: Download Godot ${{ env.GODOT_VERSION }}
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_mono_linux_x86_64.zip"
          unzip -q Godot_v${GODOT_VERSION}-stable_mono_linux_x86_64.zip
          # Godot 4.x mono zips may contain a directory; find the actual binary
          if [ -f "Godot_v${GODOT_VERSION}-stable_mono_linux_x86_64" ]; then
            mv Godot_v${GODOT_VERSION}-stable_mono_linux_x86_64 godot
          else
            mv Godot_v${GODOT_VERSION}-stable_mono_linux_*_64/Godot_v${GODOT_VERSION}-stable_mono_linux.* godot 2>/dev/null || \
            mv Godot_v${GODOT_VERSION}-stable_mono_linux_*_64/Godot_v* godot
          fi
          chmod +x godot

      - name: Download HTML5 export templates
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_mono_export_templates.tpz"
          mkdir -p ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable.mono
          unzip -q Godot_v${GODOT_VERSION}-stable_mono_export_templates.tpz -d ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable.mono
          mv ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable.mono/templates/* ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable.mono/ 2>/dev/null || true
          rm -rf ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable.mono/templates 2>/dev/null || true
          ls ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable.mono/

      - name: Restore NuGet packages
        run: dotnet restore "${{ env.PROJECT_NAME }}.csproj"

      - name: Build C# solution
        run: |
          dotnet build "${{ env.PROJECT_NAME }}.csproj" -c Release --no-restore
          echo "C# build step completed"

      - name: Prepare GodotSharp API assemblies
        run: |
          mkdir -p GodotSharp/Api/Debug
          # Find GodotSharp API assemblies from NuGet cache and copy them
          GODOT_SHARP_DLL=$(find ~/.nuget -name "GodotSharp.dll" -path "*/net8.0/*" 2>/dev/null | head -1)
          if [ -n "$GODOT_SHARP_DLL" ]; then
            GODOT_SHARP_DIR=$(dirname "$GODOT_SHARP_DLL")
            cp "$GODOT_SHARP_DIR"/*.dll GodotSharp/Api/Debug/ 2>/dev/null || true
            echo "Copied GodotSharp assemblies:"
            ls GodotSharp/Api/Debug/
          else
            echo "WARNING: GodotSharp.dll not found in NuGet cache"
          fi

      - name: Export HTML5
        run: |
          mkdir -p build/html5
          ./godot --headless --verbose --export-release "HTML5" "build/html5/index.html" 2>&1
          echo "Export done. Contents:"
          ls -la build/html5/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/html5

  deploy:
    name: Deploy to GitHub Pages
    needs: export-html5
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
