name: "Godot HTML5 Export & Deploy to Pages"

on:
  push:
    branches: [main]
  workflow_dispatch:  # 允许手动触发

env:
  GODOT_VERSION: "4.6.2"
  PROJECT_NAME: "StackFarming"
  EXPORT_NAME: "stack-agriculture"

jobs:
  export-html5:
    name: HTML5 Export
    runs-on: ubuntu-latest
    container:
      image: ubuntu:24.04
    timeout-minutes: 20

    steps:
      - name: Install system dependencies
        run: |
          apt-get update -qq
          apt-get install -y -qq wget unzip dotnet-sdk-8.0

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download Godot ${{ env.GODOT_VERSION }}
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_mono_linux_x86_64.zip"
          unzip -q Godot_v${GODOT_VERSION}-stable_mono_linux_x86_64.zip
          mv Godot_v${GODOT_VERSION}-stable_mono_linux_x86_64 godot
          chmod +x godot

      - name: Download HTML5 export templates
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_mono_export_templates.tpz"
          mkdir -p ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable.mono
          unzip -q Godot_v${GODOT_VERSION}-stable_mono_export_templates.tpz -d ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable.mono
          mv ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable.mono/templates/* ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable.mono/
          rm -rf ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable.mono/templates

      - name: Restore NuGet packages
        run: dotnet restore "${{ env.PROJECT_NAME }}.csproj"

      - name: Build C# solution
        run: |
          ./godot --headless --build-solutions --quit 2>&1 || true
          # Sometimes Godot exits with error even on success for headless builds
          echo "Build step completed"

      - name: Export HTML5
        run: |
          mkdir -p build/html5
          ./godot --headless --export-release "HTML5" "build/html5/index.html" 2>&1 || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/html5

  deploy:
    name: Deploy to GitHub Pages
    needs: export-html5
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
